name: Validate shared CDP reverse-engineering flow

on:
  pull_request:
    paths:
      - ".github/workflows/validate-dual-cdp.yml"
      - "validation/dual-cdp/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "fixture runs a deterministic authenticated SSE app; live uses the inputs and BROWSER_STORAGE_STATE_B64"
        required: true
        type: choice
        default: fixture
        options:
          - fixture
          - live
      target_url:
        description: "Live mode: authenticated application URL"
        required: false
        type: string
      auth_check_text:
        description: "Live mode: text visible only after login"
        required: false
        type: string
      message_locator_text:
        description: "Live mode: unique text on the message input snapshot line"
        required: false
        type: string
      submit_locator_text:
        description: "Live mode: unique text on the submit control; leave empty to press Enter"
        required: false
        type: string
      request_url_filter:
        description: "Live mode: unique substring of the message POST endpoint"
        required: false
        type: string
      script_search_query:
        description: "Live mode: source text to locate; defaults to request_url_filter"
        required: false
        type: string
      test_message:
        description: "Message sent by the validation flow"
        required: false
        type: string
        default: "Reply with exactly: dual-cdp-ok"
      wait_after_submit_ms:
        description: "Time allowed for the streaming response to finish"
        required: false
        type: string
        default: "8000"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VALIDATION_MODE: ${{ inputs.mode || 'fixture' }}
      TARGET_URL: ${{ inputs.target_url || '' }}
      AUTH_CHECK_TEXT: ${{ inputs.auth_check_text || '' }}
      MESSAGE_LOCATOR_TEXT: ${{ inputs.message_locator_text || '' }}
      SUBMIT_LOCATOR_TEXT: ${{ inputs.submit_locator_text || '' }}
      REQUEST_URL_FILTER: ${{ inputs.request_url_filter || '' }}
      SCRIPT_SEARCH_QUERY: ${{ inputs.script_search_query || '' }}
      TEST_MESSAGE: ${{ inputs.test_message || 'dual-cdp fixture message' }}
      WAIT_AFTER_SUBMIT_MS: ${{ inputs.wait_after_submit_ms || '4000' }}
      BROWSER_STORAGE_STATE_B64: ${{ secrets.BROWSER_STORAGE_STATE_B64 }}
      OUTPUT_DIR: ${{ github.workspace }}/artifacts/dual-cdp-validation

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python validation dependencies
        run: python -m pip install -r validation/dual-cdp/requirements.txt

      - name: Install upstream command-line tools
        run: npm install --global @playwright/cli@0.1.17 js-reverse-mcp@4.0.1

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run shared-CDP validation
        run: python validation/dual-cdp/run_validation.py

      - name: Upload captured evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dual-cdp-validation-${{ github.run_id }}
          path: artifacts/dual-cdp-validation
          if-no-files-found: error
          retention-days: 7
