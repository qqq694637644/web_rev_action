name: Validate Skill-driven Action contracts

on:
  pull_request:
    paths:
      - ".github/workflows/validate-skill-contracts.yml"
      - "src/**"
      - "tests/**"
      - "tools/**"
      - "evals/**"
      - "GPT_ACTION_PROMPT.md"
      - "BUILDER_SMOKE_CHECKLIST.md"
      - "pyproject.toml"
      - "README.md"
      - "INSTALL.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install project and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Regenerate Browser operation contracts
        run: >-
          python -m skill_temple.contract_builder
          --protocol-root src/skill_temple/example_skills/browser-action-protocol

      - name: Regenerate GPT Instructions
        run: >-
          python -m skill_temple.prompt_builder
          --skills-dir src/skill_temple/example_skills
          --template GPT_ACTION_PROMPT.md
          --output dist/GPT_INSTRUCTIONS.md

      - name: Fail on generated artifact drift
        run: git diff --exit-code -- src/skill_temple/example_skills/browser-action-protocol

      - name: Audit removed compatibility surfaces
        run: python -m skill_temple.dead_code_audit --root .

      - name: Validate GPT Builder inputs
        run: python -m skill_temple.builder_preflight --root .

      - name: Lint Python
        run: python -m ruff check .

      - name: Run Python tests
        run: python -m pytest -q

      - name: Run replay runtime tests
        run: node --test tests/runtime/replay_runtime.test.js

      - name: Run Skill catalog evals
        run: python -m skill_temple.evals evals/skill_queries.jsonl

      - name: Build wheel and verify generated package data
        shell: pwsh
        run: |
          $wheelDir = Join-Path $env:RUNNER_TEMP 'web-rev-action-wheel'
          New-Item -ItemType Directory -Force $wheelDir | Out-Null
          python -m pip wheel . --no-deps --wheel-dir $wheelDir
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $wheel = Get-ChildItem $wheelDir -Filter '*.whl' | Select-Object -First 1
          if (-not $wheel) { throw 'wheel not created' }
          python -c "import sys,zipfile; z=zipfile.ZipFile(sys.argv[1]); names=set(z.namelist()); required=['skill_temple/example_skills/browser-action-protocol/SKILL.md','skill_temple/example_skills/browser-action-protocol/docs/generated/operation-contracts.json','skill_temple/example_skills/browser-session-capture/SKILL.md','skill_temple/example_skills/browser-evidence-inspection/SKILL.md','skill_temple/example_skills/browser-request-replay/SKILL.md','skill_temple/example_skills/browser-script-tracing/SKILL.md','skill_temple/example_skills/browser-stream-diagnostics/SKILL.md','skill_temple/example_skills/browser-experiment-recovery/SKILL.md']; missing=[x for x in required if x not in names]; print('missing=' + repr(missing)); raise SystemExit(1 if missing else 0)" $wheel.FullName
